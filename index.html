<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArchAI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
    background: radial-gradient(circle at top, #020617, #020617);
    font-family: 'Inter', sans-serif;
}

.glass {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
}

.gradient {
    background: linear-gradient(135deg,#6366f1,#a855f7);
}
</style>
</head>

<body class="text-slate-300 min-h-screen">

<!-- NAVBAR -->
<div class="border-b border-slate-800 bg-slate-950/70 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
        <h1 class="text-2xl font-black text-white">
            Arch<span class="text-indigo-400">AI</span>
        </h1>
        <div id="apiIndicator" class="text-xs text-slate-400">Idle</div>
    </div>
</div>

<!-- MAIN -->
<div class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-12 gap-8">

<!-- LEFT PANEL -->
<div class="lg:col-span-4 space-y-6">

<div class="glass p-8 rounded-3xl text-center hover:border-indigo-500 transition">
    <label class="cursor-pointer">
        <input type="file" class="hidden" onchange="handleResume(event)">
        <div class="mb-4">
            <i class="fas fa-file-upload text-3xl text-indigo-400"></i>
        </div>
        <p id="uploadText" class="font-semibold text-slate-300">
            Upload Resume
        </p>
    </label>
</div>

<div id="actualProfile" class="hidden glass p-6 rounded-3xl">
<h3 id="userName" class="text-xl font-bold text-white"></h3>
<p id="userRole" class="text-indigo-400 mb-4"></p>
<div id="userSkills" class="flex flex-wrap gap-2"></div>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="lg:col-span-8 space-y-4">

<h2 class="text-lg font-bold text-white">Market Matches</h2>

<div id="jobFeed" class="space-y-4"></div>

</div>

</div>

<!-- MODAL -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
<div class="glass w-[900px] max-h-[90vh] overflow-y-auto rounded-3xl p-8">

<div class="flex justify-between items-start mb-4">
    <div>
        <h2 id="mTitle" class="text-xl font-bold text-white"></h2>
        <p id="mCompany" class="text-indigo-400"></p>
    </div>
    <button onclick="closeModal()">✕</button>
</div>

<h4 class="text-xs text-slate-400 uppercase mt-4 mb-1">Strategy</h4>
<p id="mStrategy"></p>

<h4 class="text-xs text-slate-400 uppercase mt-4 mb-1">Skill Gaps</h4>
<div id="mGaps" class="flex flex-wrap gap-2"></div>

<h4 class="text-xs text-slate-400 uppercase mt-4 mb-1">Learning Path</h4>
<div id="mCourses" class="space-y-2"></div>

<h4 class="text-xs text-slate-400 uppercase mt-4 mb-1">Resume Fix</h4>
<pre id="mLatex" class="bg-black/40 p-3 rounded text-xs"></pre>

</div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let jobs=[];
let lastResumeText='';

async function handleResume(e){
const file=e.target.files[0];
if(!file) return;

document.getElementById('uploadText').innerText="Analyzing...";

try {
const buf=await file.arrayBuffer();
const pdf=await pdfjsLib.getDocument({data:buf}).promise;

let text='';
for(let i=1;i<=pdf.numPages;i++){
const pg=await pdf.getPage(i);
const ct=await pg.getTextContent();
text+=ct.items.map(x=>x.str).join(' ');
}

lastResumeText=text;
await triggerAnalysis();

} catch(err) {
    console.error(err);
    alert("PDF parsing failed");
}
}

async function triggerAnalysis(){
try {

const res=await fetch('/api/analyze',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({resumeText:lastResumeText})
});

const data=await res.json();

console.log("API RESPONSE:", data);

// ✅ Strong validation
if (!data || typeof data !== "object") {
    throw new Error("Invalid API response");
}

if (data.error) {
    throw new Error(data.error);
}

if (!data.jobs || !Array.isArray(data.jobs)) {
    throw new Error("Invalid jobs array");
}

updateSidebar(data);

jobs = data.jobs;
const safeJobs = Array.isArray(jobs) ? jobs : [];

if(safeJobs.length === 0) {
    document.getElementById('jobFeed').innerHTML = `
        <div class="text-center py-20 opacity-30">
            <p>No jobs found. Try reanalyzing.</p>
        </div>
    `;
    return;
}

renderJobs();

document.getElementById('apiIndicator').innerText = "Synced";

} catch(err) {
    console.error(err);
    document.getElementById('apiIndicator').innerText = "Error";

    document.getElementById('jobFeed').innerHTML = `
        <div class="text-center py-20 text-rose-400">
            ⚠️ Something went wrong. Try again.
        </div>
    `;
}
}

function updateSidebar(data){
document.getElementById('actualProfile').classList.remove('hidden');

document.getElementById('userName').innerText=data.candidateName||"Candidate";
document.getElementById('userRole').innerText=data.suggestedRole||"Role";

document.getElementById('userSkills').innerHTML =
(data.skills||[]).map(s=>`
<span class="px-3 py-1 bg-slate-800 text-xs rounded-full">${s}</span>
`).join('');
}

function renderJobs() {
const feed = document.getElementById('jobFeed');
const safeJobs = Array.isArray(jobs) ? jobs : [];

feed.innerHTML = safeJobs.map((j, idx) => `
<div class="glass p-6 rounded-2xl border border-slate-800/50 hover:border-indigo-500/30 transition-all flex justify-between items-center">

    <div onclick="openDetails(${idx})" class="cursor-pointer">
        <h4 class="text-white font-bold">${j.title || "Unknown Role"}</h4>
        <p class="text-sm text-slate-400">${j.company || "Unknown Company"}</p>
        <p class="text-xs text-rose-400">
            ${(Array.isArray(j.skills_missing) ? j.skills_missing : []).slice(0,2).join(', ')}
        </p>
    </div>

    <button 
    onclick="window.open('${j.apply_link || '#'}','_blank'); event.stopPropagation();"
    class="bg-indigo-600 px-3 py-1 rounded text-xs font-bold">
    Apply
    </button>

</div>
`).join('');
}

function openDetails(idx){
const j=jobs[idx]|| {};

document.getElementById('mTitle').innerText = j.title || "Unknown Role";
document.getElementById('mCompany').innerText = j.company || "Unknown Company";
document.getElementById('mStrategy').innerText = j.strategy || "No strategy available";
document.getElementById('mLatex').innerText = j.latex || "No suggestion available";

const gaps = Array.isArray(j.skills_missing) ? j.skills_missing : [];

document.getElementById('mGaps').innerHTML =
gaps.length
? gaps.map(g=>`<span class="px-2 py-1 bg-rose-500/20 text-rose-400 text-xs rounded">${g}</span>`).join('')
: "No gaps";

const courses = Array.isArray(j.courses) ? j.courses : [];

document.getElementById('mCourses').innerHTML =
courses.length
? courses.map(c=>`
<div class="text-indigo-400 cursor-pointer hover:underline"
onclick="window.open('https://youtube.com/results?search_query=${encodeURIComponent(c.query||c.title)}')">
▶ ${c.title || "Learn"}
</div>
`).join('')
: "No courses";

document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal(){
document.getElementById('detailModal').classList.add('hidden');
}
</script>

</body>
</html>
