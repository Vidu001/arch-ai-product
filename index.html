<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{font-family:system-ui;background:#0f172a;color:#fff;padding:20px}
button{padding:8px 12px;margin:5px;border-radius:6px;border:none;cursor:pointer}
.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px}
</style>
</head>

<body>

<h2>⚡ ArchAI Live</h2>
  

<input type="file" accept=".pdf" onchange="handleUpload(event)">
<button onclick="reanalyze()">Refresh Jobs ↻</button>
<button onclick="downloadLatex()">Export Resume ↓</button>

<div id="output"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let jobs = [];
let seenJobs = new Set();
let lastResumeText = '';

async function handleUpload(e) {
  const file = e.target.files[0];
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;

  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const pg = await pdf.getPage(i);
    const ct = await pg.getTextContent();
    text += ct.items.map(x => x.str).join(' ');
  }

  lastResumeText = text;
  callAPI(false);
}

async function callAPI(isRefresh) {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      resumeText: lastResumeText,
      seenJobs: Array.from(seenJobs)
    })
  });

  const data = await res.json();

  let newJobs = [];

  for (let j of data.jobs) {
    const key = (j.title + j.company).toLowerCase();

    if (!seenJobs.has(key)) {
      seenJobs.add(key);
      newJobs.push(j);
    }
  }

  jobs = isRefresh ? [...jobs, ...newJobs] : newJobs;

  render();
}

function render() {
  const out = document.getElementById('output');

  out.innerHTML = jobs.map(j => `
    <div class="card">
      <h3>${j.title} @ ${j.company}</h3>
      <p>Score: ${j.score}</p>
      <p>Gap: ${j.gap}</p>
      <p>${j.strategy}</p>

      <p><b>Course:</b> ${j.courseTitle}</p>
      <button onclick="applyJob('${j.title}','${j.company}')">Apply</button>
    </div>
  `).join('');
}

function applyJob(title, company) {
  const q = encodeURIComponent(title + " " + company);
  window.open(`https://www.linkedin.com/jobs/search/?keywords=${q}`, "_blank");
}

function reanalyze() {
  if (!lastResumeText) return;
  callAPI(true);
}

function downloadLatex() {
  const content = `
\\documentclass{article}
\\begin{document}
${jobs.map(j => j.latex).join('\n')}
\\end{document}`;

  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'resume.tex';
  a.click();
}
</script>

</body>
</html>
