<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchAI | Strategic Career Command Center</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .premium-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }

        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

<body class="text-slate-300 min-h-screen pb-12">

<!-- Navbar -->
<nav class="border-b border-slate-800/60 bg-slate-950/50 backdrop-blur-xl sticky top-0 z-[100]">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <h1 class="text-2xl font-black text-white">Arch<span class="text-indigo-400">AI</span></h1>

        <div id="apiIndicator" class="text-xs text-slate-400">Idle</div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-12 grid lg:grid-cols-12 gap-8">

<!-- LEFT -->
<div class="lg:col-span-4 space-y-6">
    <div class="glass p-6 rounded-2xl">
        <input type="file" id="resumeInput" accept=".pdf" onchange="handleResume(event)">
        <p id="uploadText">Upload Resume</p>
    </div>

    <div id="actualProfile" class="hidden">
        <h3 id="userName"></h3>
        <p id="userRole"></p>
        <div id="userSkills"></div>
    </div>
</div>

<!-- RIGHT -->
<div class="lg:col-span-8">
    <div id="jobFeed"></div>
</div>

</main>

<!-- MODAL -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="glass p-6 w-[800px]">

<h2 id="mTitle"></h2>
<p id="mCompany"></p>

<h4>Strategy</h4>
<p id="mStrategy"></p>

<h4>Skill Gaps</h4>
<div id="mGaps"></div>

<h4>Learning Path</h4>
<div id="mCourses"></div>

<h4>LaTeX Resume</h4>
<pre id="mLatex"></pre>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let jobs = [];
let seenKeys = new Set();
let lastResumeText = '';

async function handleResume(e) {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('uploadText').innerText = "Analyzing...";

    try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: buf}).promise;

        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
            const pg = await pdf.getPage(i);
            const ct = await pg.getTextContent();
            text += ct.items.map(x => x.str).join(' ');
        }

        lastResumeText = text;
        await triggerAnalysis();

    } catch (err) {
        console.error(err);
        alert("PDF parsing failed");
    }
}

async function triggerAnalysis() {
    try {
        const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                resumeText: lastResumeText,
                seenJobs: Array.from(seenKeys)
            })
        });

        const data = await res.json();
        console.log("API RESPONSE:", data);

        // ✅ STRONG VALIDATION
        if (data.error) throw new Error(data.error);
        if (!Array.isArray(data.jobs)) throw new Error("Invalid jobs array");

        updateSidebar(data);

        jobs = data.jobs;
        renderJobs();

    } catch (err) {
        console.error(err);
        document.getElementById('apiIndicator').innerText = "Error";
    }
}

function updateSidebar(data) {
    document.getElementById('actualProfile').classList.remove('hidden');

    document.getElementById('userName').innerText =
        data.candidateName || "Candidate";

    document.getElementById('userRole').innerText =
        data.suggestedRole || "Role";

    document.getElementById('userSkills').innerHTML =
        (data.skills || []).map(s => `<span>${s}</span>`).join('');
}

function renderJobs() {
    const feed = document.getElementById('jobFeed');

    feed.innerHTML = jobs.map((j, idx) => `
        <div onclick="openDetails(${idx})" class="border p-4 cursor-pointer">
            <h3>${j.title || "Unknown Role"}</h3>
            <p>${j.company || "Unknown Company"}</p>
            <p>${(j.skills_missing || []).slice(0,2).join(', ')}</p>
        </div>
    `).join('');
}

function openDetails(idx) {
    const j = jobs[idx];

    document.getElementById('mTitle').innerText = j.title || "";
    document.getElementById('mCompany').innerText = j.company || "";
    document.getElementById('mStrategy').innerText = j.strategy || "";

    document.getElementById('mLatex').innerText =
        j.latex || "No suggestion";

    // ✅ SKILLS
    const gaps = j.skills_missing || [];
    document.getElementById('mGaps').innerHTML =
        gaps.length
        ? gaps.map(g => `<span>${g}</span>`).join('')
        : "No gaps";

    // ✅ COURSES (SAFE)
    const courses = j.courses || [];
    document.getElementById('mCourses').innerHTML =
        courses.length
        ? courses.map(c => `
            <div onclick="window.open(
                'https://www.youtube.com/results?search_query=${encodeURIComponent(c.query || c.title)}'
            )">
                ▶ ${c.title || "Learn skill"}
            </div>
        `).join('')
        : "No courses";

    document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('detailModal').classList.add('hidden');
}
</script>

</body>
</html>
